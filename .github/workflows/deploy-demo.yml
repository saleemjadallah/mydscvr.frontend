name: Deploy Demo Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even if no changes'
        required: false
        default: false
        type: boolean

jobs:
  deploy-demo:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        
    - name: Get dependencies
      run: |
        cd dxb_events_web
        flutter pub get
        
    - name: Build demo version
      run: |
        cd dxb_events_web
        flutter build web --dart-define=DEMO_MODE=true --dart-define=DEMO_USERNAME=${{ secrets.DEMO_USERNAME }} --dart-define=DEMO_PASSWORD=${{ secrets.DEMO_PASSWORD }} --release
        
    - name: Prepare demo build
      run: |
        cd dxb_events_web
        # Use the ad-free HTML template
        cp web/index_demo.html build/web/index.html
        
        # Create basic auth setup for hosting
        echo "User-agent: *" > build/web/robots.txt
        echo "Disallow: /" >> build/web/robots.txt
        
    - name: Deploy to Netlify (Demo)
      uses: nwtgck/actions-netlify@v3.0
      with:
        publish-dir: './dxb_events_web/build/web'
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Deploy demo site from commit ${{ github.sha }}"
        enable-pull-request-comment: false
        enable-commit-comment: false
        enable-commit-status: true
        alias: demo-mydscvr
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEMO_SITE_ID }}
        
    - name: Setup password protection
      run: |
        # This will be handled by Netlify's visitor access control
        # Password is set in Netlify dashboard using the GitHub Secret
        echo "Password protection configured via Netlify dashboard"
        echo "Demo URL: https://demo.mydscvr.ai"
        echo "Credentials stored in GitHub Secrets"