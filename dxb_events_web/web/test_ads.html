<!DOCTYPE html>
<html>
<head>
    <title>Ad Network Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-container {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #ccc;
            background: #f5f5f5;
        }
        .ad-container {
            width: 300px;
            height: 250px;
            border: 1px solid #999;
            margin: 10px 0;
            position: relative;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Ad Network Connectivity Test</h1>
    
    <div class="test-container">
        <h2>Test 1: Native Banner (e1bd304e9b4f790ab61f30e117275a37)</h2>
        <div class="status info">Testing script load...</div>
        <div id="container-e1bd304e9b4f790ab61f30e117275a37" class="ad-container"></div>
        <button onclick="reloadTest1()">Try Reload</button>
    </div>

    <div class="test-container">
        <h2>Test 2: Ad Key (0c346d8dd7b206d16df3d22d25820f9e)</h2>
        <div class="status info">Testing script load...</div>
        <div id="container-0c346d8dd7b206d16df3d22d25820f9e" class="ad-container"></div>
        <button onclick="reloadTest2()">Try Reload</button>
    </div>

    <div class="test-container">
        <h2>Test 3: Direct Script Test</h2>
        <div id="test-results"></div>
    </div>

    <script>
        // Test 1: Native Banner
        (function() {
            const script = document.createElement('script');
            script.async = true;
            script.src = '//pl27139224.profitableratecpm.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js';
            
            script.onload = function() {
                document.querySelector('.test-container:nth-child(2) .status').className = 'status success';
                document.querySelector('.test-container:nth-child(2) .status').textContent = 'Script loaded successfully!';
                
                // Check for reload function
                setTimeout(() => {
                    const container = document.getElementById('container-e1bd304e9b4f790ab61f30e117275a37');
                    if (container && container.reload) {
                        document.querySelector('.test-container:nth-child(2) .status').textContent += ' Reload function found!';
                    } else {
                        document.querySelector('.test-container:nth-child(2) .status').textContent += ' No reload function.';
                    }
                }, 2000);
            };
            
            script.onerror = function(e) {
                document.querySelector('.test-container:nth-child(2) .status').className = 'status error';
                document.querySelector('.test-container:nth-child(2) .status').textContent = 'Script failed to load: ' + script.src;
            };
            
            document.getElementById('container-e1bd304e9b4f790ab61f30e117275a37').appendChild(script);
        })();

        // Test 2: Other ad key
        (function() {
            const script = document.createElement('script');
            script.async = true;
            script.src = '//pl27139224.profitableratecpm.com/0c346d8dd7b206d16df3d22d25820f9e/invoke.js';
            
            script.onload = function() {
                document.querySelector('.test-container:nth-child(3) .status').className = 'status success';
                document.querySelector('.test-container:nth-child(3) .status').textContent = 'Script loaded successfully!';
            };
            
            script.onerror = function(e) {
                document.querySelector('.test-container:nth-child(3) .status').className = 'status error';
                document.querySelector('.test-container:nth-child(3) .status').textContent = 'Script failed to load: ' + script.src;
            };
            
            document.getElementById('container-0c346d8dd7b206d16df3d22d25820f9e').appendChild(script);
        })();

        // Test 3: Test multiple URLs
        const testUrls = [
            '//pl27139224.profitableratecpm.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js',
            '//www.topcreativeformat.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js',
            '//pl15015147.pvclouds.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js',
            '//www.highperformanceformat.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js'
        ];

        const results = document.getElementById('test-results');
        
        testUrls.forEach(url => {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'status info';
            resultDiv.textContent = `Testing ${url}...`;
            results.appendChild(resultDiv);
            
            // Test with fetch
            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    resultDiv.className = 'status success';
                    resultDiv.textContent = `${url} - Reachable (no-cors)`;
                })
                .catch(error => {
                    resultDiv.className = 'status error';
                    resultDiv.textContent = `${url} - Failed: ${error.message}`;
                });
        });

        // Reload functions
        function reloadTest1() {
            const container = document.getElementById('container-e1bd304e9b4f790ab61f30e117275a37');
            if (container && container.reload) {
                container.reload();
                alert('Reload called!');
            } else {
                alert('No reload function available');
            }
        }

        function reloadTest2() {
            const container = document.getElementById('container-0c346d8dd7b206d16df3d22d25820f9e');
            if (container && container.reload) {
                container.reload();
                alert('Reload called!');
            } else {
                alert('No reload function available');
            }
        }
    </script>
</body>
</html>
