<!DOCTYPE html>
<html>
<head>
    <title>Ad URL Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        .container { width: 300px; height: 250px; border: 1px solid #999; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Testing Different Ad URL Patterns</h1>
    
    <div class="test">
        <h3>Test 1: With protocol (https:)</h3>
        <div id="container-test1" class="container"></div>
        <div id="status-test1">Loading...</div>
    </div>

    <div class="test">
        <h3>Test 2: Without protocol (//)</h3>
        <div id="container-test2" class="container"></div>
        <div id="status-test2">Loading...</div>
    </div>

    <div class="test">
        <h3>Test 3: Different ad key format</h3>
        <div id="container-test3" class="container"></div>
        <div id="status-test3">Loading...</div>
    </div>

    <div class="test">
        <h3>Test 4: Direct fetch test</h3>
        <div id="fetch-results"></div>
    </div>

    <script>
        // Test 1: With protocol
        (function() {
            const script = document.createElement('script');
            script.async = true;
            script.src = 'https://pl27139224.profitableratecpm.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js';
            
            script.onload = () => {
                document.getElementById('status-test1').textContent = 'Script loaded!';
                document.getElementById('status-test1').parentElement.classList.add('success');
            };
            
            script.onerror = () => {
                document.getElementById('status-test1').textContent = 'Failed to load';
                document.getElementById('status-test1').parentElement.classList.add('error');
            };
            
            document.getElementById('container-test1').appendChild(script);
        })();

        // Test 2: Without protocol
        (function() {
            const script = document.createElement('script');
            script.async = true;
            script.src = '//pl27139224.profitableratecpm.com/0c346d8dd7b206d16df3d22d25820f9e/invoke.js';
            
            script.onload = () => {
                document.getElementById('status-test2').textContent = 'Script loaded!';
                document.getElementById('status-test2').parentElement.classList.add('success');
            };
            
            script.onerror = () => {
                document.getElementById('status-test2').textContent = 'Failed to load';
                document.getElementById('status-test2').parentElement.classList.add('error');
            };
            
            document.getElementById('container-test2').appendChild(script);
        })();

        // Test 3: Different format
        (function() {
            // First set up the container with the expected ID
            const container = document.getElementById('container-test3');
            container.id = 'container-e1bd304e9b4f790ab61f30e117275a37';
            
            const script = document.createElement('script');
            script.async = true;
            script.setAttribute('data-cfasync', 'false');
            script.src = '//pl27139224.profitableratecpm.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js';
            
            script.onload = () => {
                document.getElementById('status-test3').textContent = 'Script loaded!';
                document.getElementById('status-test3').parentElement.classList.add('success');
                
                // Check for reload function
                setTimeout(() => {
                    if (container.reload) {
                        document.getElementById('status-test3').textContent += ' - Reload function found!';
                    }
                }, 1000);
            };
            
            script.onerror = () => {
                document.getElementById('status-test3').textContent = 'Failed to load';
                document.getElementById('status-test3').parentElement.classList.add('error');
            };
            
            container.appendChild(script);
        })();

        // Test 4: Fetch tests
        const urls = [
            'https://pl27139224.profitableratecpm.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js',
            'http://pl27139224.profitableratecpm.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js',
            'https://www.topcreativeformat.com/0c346d8dd7b206d16df3d22d25820f9e/invoke.js',
            'https://pl15015147.pvclouds.com/23759220ab9b0b63f8ac21a765ea01ac/invoke.js'
        ];

        const fetchResults = document.getElementById('fetch-results');
        
        urls.forEach(url => {
            const div = document.createElement('div');
            div.textContent = `Testing ${url}...`;
            fetchResults.appendChild(div);
            
            // Try with no-cors mode
            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    div.textContent = `${url} - Accessible (no-cors)`;
                    div.style.color = 'green';
                })
                .catch(err => {
                    div.textContent = `${url} - Error: ${err.message}`;
                    div.style.color = 'red';
                });
        });
    </script>
</body>
</html>
