<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .ad-label {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            color: #999999;
            background-color: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 10;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666666;
        }
    </style>
</head>
<body>
    <div class="ad-label">Advertisement</div>
    <div id="loading" class="loading">Loading ad...</div>
    
    <script type="text/javascript">
        // Get ad key from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const adKey = urlParams.get('key') || '0c346d8dd7b206d16df3d22d25820f9e';
        const width = parseInt(urlParams.get('width') || '300');
        const height = parseInt(urlParams.get('height') || '250');
        
        atOptions = {
            'key' : adKey,
            'format' : 'iframe',
            'height' : height,
            'width' : width,
            'params' : {}
        };
        
        // Hide loading after script loads or on timeout
        setTimeout(function() {
            var loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'none';
            }
        }, 5000);
        
        // Load the ad script with fallback
        function loadAdScript() {
            var script = document.createElement('script');
            script.type = 'text/javascript';
            
            // Check your actual Adsterra publisher account for the correct JSAsync code
        // The domain may be different for your specific ad unit
        // Common Adsterra domains include:
        var urls = [
            'https://a.adtng.com/' + adKey + '/invoke.js',
            '//a.adtng.com/' + adKey + '/invoke.js',
            'https://cdn.adtng.com/' + adKey + '/invoke.js', 
            '//cdn.adtng.com/' + adKey + '/invoke.js',
            'https://js.adtng.com/' + adKey + '/invoke.js',
            '//js.adtng.com/' + adKey + '/invoke.js'
        ];
            
            var currentUrlIndex = 0;
            
            function tryNextUrl() {
                if (currentUrlIndex >= urls.length) {
                    // All URLs failed
                    var loading = document.getElementById('loading');
                    if (loading) {
                        loading.innerHTML = 'Ad temporarily unavailable';
                        loading.style.color = '#dc3545';
                        loading.style.fontSize = '12px';
                    }
                    return;
                }
                
                script.src = urls[currentUrlIndex];
                currentUrlIndex++;
                
                script.onload = function() {
                    console.log('Adsterra script loaded successfully from:', script.src);
                    var loading = document.getElementById('loading');
                    if (loading) {
                        loading.style.display = 'none';
                    }
                    // Give ad time to render
                    setTimeout(function() {
                        // Check if ad container was created
                        var adElements = document.querySelectorAll('[id*="adsterra"], iframe');
                        if (adElements.length > 0) {
                            console.log('Ad elements found:', adElements.length);
                        } else {
                            console.log('No ad elements found, ad may not have loaded properly');
                        }
                    }, 2000);
                };
                
                script.onerror = function() {
                    console.log('Failed to load script from:', script.src);
                    // Remove failed script and try next URL
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                    script = document.createElement('script');
                    script.type = 'text/javascript';
                    setTimeout(tryNextUrl, 100);
                };
                
                document.head.appendChild(script);
            }
            
            tryNextUrl();
        }
        
        // Start loading after a short delay
        setTimeout(loadAdScript, 100);
    </script>
</body>
</html>
