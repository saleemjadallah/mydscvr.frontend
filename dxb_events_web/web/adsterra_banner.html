<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .ad-label {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            color: #999999;
            background-color: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 10;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666666;
        }
    </style>
</head>
<body>
    <div class="ad-label">Advertisement</div>
    <div id="loading" class="loading">Loading ad...</div>
    
    <script type="text/javascript">
        // Get ad key from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const adKey = urlParams.get('key') || '0c346d8dd7b206d16df3d22d25820f9e';
        const width = parseInt(urlParams.get('width') || '300');
        const height = parseInt(urlParams.get('height') || '250');
        
        atOptions = {
            'key' : adKey,
            'format' : 'iframe',
            'height' : height,
            'width' : width,
            'params' : {}
        };
        
        // Hide loading after script loads or on timeout
        setTimeout(function() {
            var loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'none';
            }
        }, 5000);
        
        // Load the ad script
        var script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = '//www.highperformanceformat.com/' + adKey + '/invoke.js';
        script.onload = function() {
            var loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'none';
            }
        };
        script.onerror = function() {
            var loading = document.getElementById('loading');
            if (loading) {
                loading.innerHTML = 'Ad temporarily unavailable';
                loading.style.color = '#dc3545';
                loading.style.fontSize = '12px';
            }
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
