<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Banner Ad</title>
</head>
<body>
    <script async="async" data-cfasync="false" src="//pl27139224.profitableratecpm.com/e1bd304e9b4f790ab61f30e117275a37/invoke.js"></script>
    <div id="container-e1bd304e9b4f790ab61f30e117275a37"></div>
    
    <script type="text/javascript">
        // Function to reload the native banner
        function reloadNativeBanner() {
            const container = document.getElementById('container-e1bd304e9b4f790ab61f30e117275a37');
            if (container && container.reload) {
                container.reload();
            }
        }
        
        // Listen for messages from Flutter for route changes
        window.addEventListener('message', (event) => {
            if (event.data === 'routeChanged') {
                reloadNativeBanner();
            }
        });
    </script>
</body>
</html>
