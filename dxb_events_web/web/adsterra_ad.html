<!DOCTYPE html>
<html>
<head>
    <title>Ad</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #f5f5f5;
        }
        .ad-container {
            width: 300px;
            height: 250px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: #666;
        }
        .loading {
            text-align: center;
        }
        .error {
            color: #999;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="ad-container" id="adContainer">
        <div class="loading">Loading ad...</div>
    </div>
    
    <script type="text/javascript">
        try {
            atOptions = {
                'key' : '0c346d8dd7b206d16df3d22d25820f9e',
                'format' : 'iframe',
                'height' : 250,
                'width' : 300,
                'params' : {}
            };
        } catch (e) {
            console.error('Error setting atOptions:', e);
        }
    </script>
    <script type="text/javascript" 
            src="https://www.highperformanceformat.com/0c346d8dd7b206d16df3d22d25820f9e/invoke.js"
            onerror="handleAdError()"
            onload="handleAdLoad()">
    </script>
    
    <script type="text/javascript">
        function handleAdLoad() {
            console.log('Adsterra script loaded successfully');
            // Hide loading message
            setTimeout(() => {
                const loading = document.querySelector('.loading');
                if (loading) {
                    loading.style.display = 'none';
                }
            }, 1000);
        }
        
        function handleAdError() {
            console.error('Failed to load Adsterra script');
            const container = document.getElementById('adContainer');
            if (container) {
                container.innerHTML = '<div class="error">Ad temporarily unavailable</div>';
            }
        }
        
        // Fallback timeout in case ad doesn't load
        setTimeout(() => {
            const loading = document.querySelector('.loading');
            if (loading && loading.style.display !== 'none') {
                handleAdError();
            }
        }, 5000);
    </script>
</body>
</html>
