name: dxb_events_web
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  
  # Core state management & routing
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  
  # GROUP 1: Core essentials ✅
  google_fonts: ^6.0.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  
  # GROUP 2: UI basics ✅
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  iconsax: ^0.0.8
  lucide_icons: ^0.257.0
  
  # GROUP 3A: Main animation library ✅ SAFE
  flutter_animate: ^4.2.0+1
  
  # GROUP 3B: Second animation library ✅ SAFE
  animate_do: ^3.1.2
  
  # GROUP 3C: Third animation library ✅ SAFE
  lottie: ^2.7.0
  
  # GROUP 3D: Fourth animation library ✅ SAFE
  flutter_staggered_animations: ^1.1.1
  
  # GROUP 4: Safe dependencies only
  shimmer: ^3.0.0
  timeago: ^3.6.0
  http: ^1.4.0
  
  # Additional required dependencies
  glassmorphism: ^3.0.0
  url_launcher: ^6.2.4
  
  # Web-safe alternatives needed
  # TODO: Replace share_plus with web-safe sharing
  # TODO: Replace flutter_secure_storage with web localStorage

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/