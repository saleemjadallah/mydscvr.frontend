  <!-- HTML Renderer for Mobile Browsers -->
  <script type="text/javascript">
    // Detect mobile browsers and use HTML renderer for better image compatibility
    function detectMobileBrowser() {
      var userAgent = navigator.userAgent || navigator.vendor || window.opera;
      
      // Check for mobile devices
      if (/android/i.test(userAgent)) return 'Android';
      if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) return 'iOS';
      if (/windows phone/i.test(userAgent)) return 'Windows Phone';
      if (/blackberry/i.test(userAgent)) return 'BlackBerry';
      if (/opera mini/i.test(userAgent)) return 'Opera Mini';
      if (/mobile/i.test(userAgent)) return 'Generic Mobile';
      
      // Check for tablets
      if (/tablet/i.test(userAgent)) return 'Tablet';
      if (/ipad/i.test(userAgent)) return 'iPad';
      
      return false;
    }
    
    var mobileDevice = detectMobileBrowser();
    
    if (mobileDevice) {
      console.log('📱 Mobile/Tablet detected:', mobileDevice);
      console.log('🌐 Switching to HTML renderer for better S3 image compatibility');
      window.flutterWebRenderer = "html";
      
      // Add a class to body for mobile-specific styling if needed
      document.body.classList.add('mobile-renderer');
    } else {
      console.log('🖥️ Desktop browser detected - using CanvasKit renderer');
      // Desktop can use the default CanvasKit renderer
      // No need to set explicitly as it's the default
    }
    
    // Log the chosen renderer and user agent for debugging
    console.log('User Agent:', navigator.userAgent);
    console.log('Flutter Web Renderer:', window.flutterWebRenderer || 'default (canvaskit)');
  </script>

    // Monitor Flutter initialization
    window.addEventListener('flutter-initialized', function() {
      console.log('Flutter initialized event received');
      document.body.classList.add('flutter-ready');
    });
    
    // Fallback: Hide loading screen after timeout
    setTimeout(function() {
      if (!document.body.classList.contains('flutter-ready')) {
        console.warn('Flutter initialization timeout - forcing loading screen removal');
        document.body.classList.add('flutter-ready');
      }
    }, 5000); // 5 seconds timeout (reduced)
    
    // Alternative detection method
    var checkFlutterReady = setInterval(function() {
      if (window._flutter && window._flutter.loader && document.querySelector('flt-glass-pane')) {
        console.log('Flutter detected via DOM check');
        document.body.classList.add('flutter-ready');
        clearInterval(checkFlutterReady);
      }
    }, 100);
    
    // Even more aggressive fallback
    window.addEventListener('load', function() {
      setTimeout(function() {
        console.log('Window loaded - removing loading screen');
        document.body.classList.add('flutter-ready');
      }, 2000);
    });
  </script>
